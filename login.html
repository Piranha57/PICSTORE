<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PICSTORE | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">☁</div>
        <span>Cloud CMS</span>
      </div>
      <nav class="menu">
        <a href="dashboard.html" class="menu-item"><span class="menu-icon">▦</span><span>Dashboard</span></a>
        <a href="create-blog.html" class="menu-item"><span class="menu-icon">✎</span><span>Create Blog</span></a>
        <a href="gallery.html" class="menu-item"><span class="menu-icon">🖼️</span><span>Gallery</span></a>
        <a href="trending.html" class="menu-item"><span class="menu-icon">⭐</span><span>Trending</span></a>
        <a href="more-searched.html" class="menu-item"><span class="menu-icon">🔎</span><span>More Searched</span></a>
        <a href="profile.html" class="menu-item"><span class="menu-icon">👤</span><span>Profile</span></a>
        <a href="login.html" class="menu-item"><span class="menu-icon">🔒</span><span>Login</span></a>
        <a href="register.html" class="menu-item"><span class="menu-icon">📝</span><span>Register</span></a>
      </nav>
    </aside>

    <main class="panel panel-form">
      <section class="auth-shell auth-login">
        <h1>Login</h1>
        <form id="loginForm" onsubmit="return validateLogin()">
          <label>
            <span>Username</span>
            <input id="loginUsername" type="text" placeholder="Username" required>
          </label>
          <label>
            <span>Password</span>
            <input id="loginPassword" type="password" placeholder="Password" required>
          </label>
          <button class="button button-primary" type="submit">Login</button>
          <p class="info-line">Don't have an account? <a href="register.html">Register</a></p>
        </form>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/validation.js"></script>
</body>
</html>
