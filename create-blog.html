<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PICSTORE | Create Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">☁</div>
        <span>PICSTORE</span>
      </div>
      <nav class="menu">
        <a href="dashboard.html" class="menu-item">Dashboard</a>
        <a href="register.html" class="menu-item">Register</a>
        <a href="login.html" class="menu-item">Login</a>
        <a href="create-blog.html" class="menu-item active">Create Blog</a>
        <a href="gallery.html" class="menu-item">Upload Image</a>
        <a href="more-searched.html" class="menu-item">More Searched</a>
        <a href="profile.html" class="menu-item">Profile</a>
      </nav>
    </aside>

    <main class="panel panel-form">
      <section class="blog-shell">
        <h1>Create New Blog</h1>
        <div id="authNotice" class="auth-notice"></div>
        <form id="blogForm" onsubmit="return validateBlog()">
          <label>
            <span>Blog Title:</span>
            <input id="blogTitle" type="text" placeholder="Enter your blog title" required>
          </label>
          <label>
            <span>Content</span>
            <textarea id="blogContent" rows="10" placeholder="Start writing your blog..." required></textarea>
          </label>
          <label class="image-picker">
            <span>Featured Image</span>
            <input id="blogImage" type="file" accept="image/*" onchange="previewImage(event)">
            <div id="imagePreview" class="image-preview">No image selected</div>
          </label>
          <button class="button button-primary" type="submit">Publish</button>
        </form>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/validation.js"></script>
</body>
</html>
